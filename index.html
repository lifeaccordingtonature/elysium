<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Explorer: minecraft crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background: #ffffff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-12vh);
    }

    .title {
      margin: 0 0 2.5rem;
      text-align: center;
      font-size: clamp(2rem, 4.2vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.7rem;
      padding: 0;
      background: none;
      border: 0;
      box-shadow: none;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 1px solid #dfe9f3;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      border-radius: 999px;
      padding: 1.02rem 1.15rem;
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--text);
      outline: none;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search input:focus {
      border-color: #cfe0f0;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 0 0 3px #e9f3fb;
    }

    .search button {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0 1.35rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search button:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    @media (max-width: 680px) {
      main {
        transform: translateY(-7vh);
      }

      .search {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.45rem;
      }

      .search input {
        min-width: 0;
        padding: 0.9rem 0.95rem;
        font-size: 0.95rem;
      }

      .search button {
        padding: 0 1rem;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  
  <div class="top">
    <button type="button" class="wallet-btn">Connect wallet</button>
  </div>

  <main class="container">
    <h1 class="title">Elysiumviewer</h1>
    <div class="search">
      <input type="text" placeholder="Search by address, name or transaction" />
      <button type="button">Search</button>
    </div>
    
  </main>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    class Blob {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 150 + 100;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.hue = 200 + Math.random() * 10;
        this.opacity = Math.random() * 0.15 + 0.1;
        this.speed = Math.random() * 0.0005 + 0.0002;
        this.angle = Math.random() * Math.PI * 2;
      }
      
      update(time) {
        this.angle += this.speed;
        this.x += Math.sin(this.angle + time * 0.0003) * 0.5;
        this.y += Math.cos(this.angle + time * 0.0002) * 0.5;
        
        if (this.x < -this.radius) this.x = canvas.width + this.radius;
        if (this.x > canvas.width + this.radius) this.x = -this.radius;
        if (this.y < -this.radius) this.y = canvas.height + this.radius;
        if (this.y > canvas.height + this.radius) this.y = -this.radius;
      }
      
      draw() {
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
        gradient.addColorStop(0, `hsla(${this.hue}, 100%, 65%, ${this.opacity})`);
        gradient.addColorStop(0.4, `hsla(${this.hue}, 100%, 70%, ${this.opacity * 0.5})`);
        gradient.addColorStop(1, `hsla(${this.hue}, 100%, 75%, 0)`);
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    const blobs = [];
    for (let i = 0; i < 8; i++) {
      blobs.push(new Blob());
    }
    
    let time = 0;
    function animate() {
      time++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      blobs.forEach(blob => {
        blob.update(time);
        blob.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
