<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Explorer: minecraft crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background: 
        radial-gradient(circle at 20% 50%, rgba(77, 184, 255, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(26, 159, 255, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 100%, rgba(77, 184, 255, 0.35) 0%, transparent 60%),
        linear-gradient(135deg, #ffffff 0%, #4db8ff 25%, #1a9fff 50%, #4db8ff 75%, #ffffff 100%);
      background-size: 
        400% 400%,
        400% 400%,
        300% 300%,
        300% 300%;
      background-position:
        0% 50%,
        100% 50%,
        50% 50%,
        0% 50%;
      animation: 
        gradientShift1 8s ease infinite,
        gradientShift2 10s ease infinite,
        gradientShift3 12s ease infinite,
        gradientShift4 6s ease infinite;
      min-height: 100vh;
    }

    @keyframes gradientShift1 {
      0% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
      50% { background-position: 100% 50%, 0% 50%, 50% 50%, 100% 50%; }
      100% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
    }

    @keyframes gradientShift2 {
      0% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
      50% { background-position: 100% 50%, 0% 50%, 50% 50%, 100% 50%; }
      100% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
    }

    @keyframes gradientShift3 {
      0% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
      50% { background-position: 100% 50%, 0% 50%, 50% 50%, 100% 50%; }
      100% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
    }

    @keyframes gradientShift4 {
      0% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
      50% { background-position: 100% 50%, 0% 50%, 50% 50%, 100% 50%; }
      100% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-12vh);
    }

    .title {
      margin: 0 0 2.5rem;
      text-align: center;
      font-size: clamp(2rem, 4.2vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.7rem;
      padding: 0;
      background: none;
      border: 0;
      box-shadow: none;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 1px solid #dfe9f3;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      border-radius: 999px;
      padding: 1.02rem 1.15rem;
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--text);
      outline: none;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search input:focus {
      border-color: #cfe0f0;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 0 0 3px #e9f3fb;
    }

    .search button {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0 1.35rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search button:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    @media (max-width: 680px) {
      main {
        transform: translateY(-7vh);
      }

      .search {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.45rem;
      }

      .search input {
        min-width: 0;
        padding: 0.9rem 0.95rem;
        font-size: 0.95rem;
      }

      .search button {
        padding: 0 1rem;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <button type="button" class="wallet-btn">Connect wallet</button>
  </div>

  <main class="container">
    <h1 class="title">Elysiumviewer</h1>
    <div class="search">
      <input type="text" placeholder="Search by address, name or transaction" />
      <button type="button">Search</button>
    </div>
    
  </main>
</body>
</html>
