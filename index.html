<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Explorer: minecraft crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background: #ffffff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-12vh);
    }

    .title {
      margin: 0 0 2.5rem;
      text-align: center;
      font-size: clamp(2rem, 4.2vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.7rem;
      padding: 0;
      background: none;
      border: 0;
      box-shadow: none;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 1px solid #dfe9f3;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      border-radius: 999px;
      padding: 1.02rem 1.15rem;
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--text);
      outline: none;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search input:focus {
      border-color: #cfe0f0;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 0 0 3px #e9f3fb;
    }

    .search button {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0 1.35rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search button:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    @media (max-width: 680px) {
      main {
        transform: translateY(-7vh);
      }

      .search {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.45rem;
      }

      .search input {
        min-width: 0;
        padding: 0.9rem 0.95rem;
        font-size: 0.95rem;
      }

      .search button {
        padding: 0 1rem;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <button type="button" class="wallet-btn">Connect wallet</button>
  </div>

  <main class="container">
    <h1 class="title">Elysiumviewer</h1>
    <div class="search">
      <input type="text" placeholder="Search by address, name or transaction" />
      <button type="button">Search</button>
    </div>
    
  </main>

  <script src="https://cdn.jsdelivr.net/npm/glsl-canvas@0.3.6/dist/glsl-canvas.umd.js"></script>
  <script>
    // Initialize glsl-canvas on body
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.zIndex = '-1';
    document.body.insertBefore(canvas, document.body.firstChild);

    const glsl = new GlslCanvas(canvas);

    glsl.setUniform('iTime', 0);
    
    const shader = `
#define C_PI 3.14159265359

vec3 hash13(float p)
{
   vec3 p3 = fract(vec3(p) * vec3(.1031, .1030, .0973));
   p3 += dot(p3, p3.yzx+33.33);
   return fract((p3.xxy+p3.yzz)*p3.zyx); 
}

vec3 flower(vec2 p, float t, float id){
    vec3 r = hash13(id+floor(t)*13.);    
    float lT = fract(-t);
    float ilT = 1.-lT;
    lT*=lT;
    float fade = sin(lT*C_PI);
    fade = smoothstep(0.0,0.1,fade);
    fade*=fract(t);
    p+=vec2(r.xy-0.5)*pow(lT,.25);
    p*=lT*5.;
    float l = length(p);
    float m = smoothstep(.4,0.,l);
    float a = atan(p.y,p.x);
    a = sin(a*r.x*1.23  + iTime*0.123) * 
        sin(a*r.y*2.321 + iTime*0.456) *
        sin(a*r.z*1.123 + iTime*0.589) *
        sin(a);
    l = mix(l,a*(r.x-0.5)*3.*ilT,r.z*0.5+0.2);
    float s1  = smoothstep(.5,0.,l);
    float s2  = smoothstep(0.01,0.,l);
    float s = (s1-s2)*m;
    vec3 c1 =  vec3(sin(s *vec3(0.987,0.765,0.543)*C_PI*1.4));
    vec3 c2 =  vec3(sin(s2*vec3(0.13*r.x,0.865*r.y,0.943*r.z)*6.664));
    vec3 sOut = (c1*mix(c2,vec3(1.),r.y*0.5+0.5)*c1)*fade;
    return  sOut*l;
}

void main() {
    vec2 uv = (gl_FragCoord.xy*2.-iResolution.xy)/iResolution.y;
    vec3 s = vec3(0.);
    const float amount = 20.;
    float del = 1./amount;
    for(float i = 1.; i <= amount; i++){
      s+=flower(uv,iTime*0.05 + del*i,i);
    }
    gl_FragColor = vec4(pow(s*3.,vec3(0.4545)),1.);
}
    `;

    glsl.setUniform('fragColor', [0, 0, 0, 1]);
    
    let time = 0;
    function animate() {
      time += 0.016;
      glsl.setUniform('iTime', time);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
