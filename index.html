<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Explorer: minecraft crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background: #ffffff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-18vh);
    }

    .title {
      margin: 0 0 2.5rem;
      text-align: center;
      font-size: clamp(1.5rem, 3.5vw, 2.4rem);
      font-weight: 950;
      letter-spacing: 0.01em;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.7rem;
      padding: 0;
      background: none;
      border: 0;
      box-shadow: none;
      position: relative;
    }

    .search-input-wrapper {
      position: relative;
      width: 100%;
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.3rem;
      height: 1.3rem;
      pointer-events: none;
      opacity: 0.6;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 1px solid #dfe9f3;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      border-radius: 999px;
      padding: 1.3rem 4.5rem 1.3rem 3.5rem;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search input:focus {
      border-color: #cfe0f0;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 0 0 3px #e9f3fb;
      padding-right: 1.5rem;
    }

    .action-btn {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 3rem;
      height: 3rem;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #3a5875;
      font-weight: 800;
      transition: all 0.3s ease;
    }

    .action-btn:hover {
      background: rgba(26, 159, 255, 0.1);
    }

    .search-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%) scale(0);
      opacity: 0;
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0 1.8rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-btn.active {
      opacity: 1;
      transform: translateY(-50%) scale(1);
      right: 0;
    }

    .search-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    @media (max-width: 680px) {
      main {
        transform: translateY(-18vh);
      }

      .search-input-wrapper {
        width: 100%;
      }

      .search input {
        padding: 1.1rem 4.5rem 1.1rem 3.5rem;
        font-size: 0.95rem;
      }

      .search-btn {
        padding: 0 1.3rem;
        font-size: 0.9rem;
      }

      .action-btn {
        width: 2.8rem;
        height: 2.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <button type="button" class="wallet-btn">Connect Wallet</button>
  </div>

  <main class="container">
    <h1 class="title">Elysiumviewer</h1>
    <div class="search">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search by address, name or transaction" />
        <button class="action-btn" id="actionBtn" title="Slash to search">/</button>
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
    </div>
  </main>

  <script>
    const input = document.getElementById('searchInput');
    const actionBtn = document.getElementById('actionBtn');
    const searchBtn = document.getElementById('searchBtn');
    let isActive = false;

    actionBtn.addEventListener('click', async () => {
      if (!isActive) {
        isActive = true;
        input.focus();
        updateActionBtn();
      } else {
        try {
          const text = await navigator.clipboard.readText();
          input.value = text;
          input.dispatchEvent(new Event('input'));
        } catch (err) {
          console.log('Paste not available');
        }
      }
    });

    input.addEventListener('input', () => {
      if (input.value.length > 0) {
        searchBtn.classList.add('active');
      } else {
        searchBtn.classList.remove('active');
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === '/') {
        e.preventDefault();
        isActive = true;
        updateActionBtn();
      }
    });

    input.addEventListener('blur', () => {
      if (input.value.length === 0) {
        isActive = false;
        updateActionBtn();
      }
    });

    function updateActionBtn() {
      if (isActive) {
        actionBtn.textContent = '⎌';
        actionBtn.title = 'Paste';
      } else {
        actionBtn.textContent = '/';
        actionBtn.title = 'Slash to search';
      }
    }

    searchBtn.addEventListener('click', () => {
      console.log('Search:', input.value);
    });
  </script>

</body>
</html>
