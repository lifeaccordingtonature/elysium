<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Explorer: minecraft crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background: black;
      min-height: 100vh;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-12vh);
    }

    .title {
      margin: 0 0 2.5rem;
      text-align: center;
      font-size: clamp(2rem, 4.2vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.7rem;
      padding: 0;
      background: none;
      border: 0;
      box-shadow: none;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 1px solid #dfe9f3;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      border-radius: 999px;
      padding: 1.02rem 1.15rem;
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--text);
      outline: none;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search input:focus {
      border-color: #cfe0f0;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 0 0 3px #e9f3fb;
    }

    .search button {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0 1.35rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search button:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    @media (max-width: 680px) {
      main {
        transform: translateY(-7vh);
      }

      .search {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.45rem;
      }

      .search input {
        min-width: 0;
        padding: 0.9rem 0.95rem;
        font-size: 0.95rem;
      }

      .search button {
        padding: 0 1rem;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const gl = canvas.getContext("webgl");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const vertex = `
    attribute vec2 position;
    void main(){
      gl_Position = vec4(position,0.0,1.0);
    }
    `;

    const fragment = `
    precision mediump float;

    uniform float time;
    uniform vec2 resolution;

    vec3 palette(float t){
      vec3 a = vec3(0.5,0.5,0.5);
      vec3 b = vec3(0.5,0.5,0.5);
      vec3 c = vec3(1.0,1.0,1.0);
      vec3 d = vec3(0.00,0.33,0.67);

      return a + b*cos(6.28318*(c*t+d));
    }

    void main(){
      vec2 uv = gl_FragCoord.xy / resolution.xy;
      uv -= 0.5;
      uv.x *= resolution.x/resolution.y;

      float d = length(uv);

      float t = time*0.2;

      float v = sin(d*8.0 - t*3.0);

      vec3 color = palette(v + t);

      gl_FragColor = vec4(color,1.0);
    }
    `;

    function createShader(type,source){
      const shader = gl.createShader(type);
      gl.shaderSource(shader,source);
      gl.compileShader(shader);
      return shader;
    }

    const program = gl.createProgram();

    gl.attachShader(program,createShader(gl.VERTEX_SHADER,vertex));
    gl.attachShader(program,createShader(gl.FRAGMENT_SHADER,fragment));
    gl.linkProgram(program);

    gl.useProgram(program);

    const vertices = new Float32Array([
    -1,-1,
    1,-1,
    -1,1,
    1,1
    ]);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buffer);
    gl.bufferData(gl.ARRAY_BUFFER,vertices,gl.STATIC_DRAW);

    const position = gl.getAttribLocation(program,"position");
    gl.enableVertexAttribArray(position);
    gl.vertexAttribPointer(position,2,gl.FLOAT,false,0,0);

    const timeLoc = gl.getUniformLocation(program,"time");
    const resLoc = gl.getUniformLocation(program,"resolution");

    function render(t){
      gl.uniform1f(timeLoc,t*0.001);
      gl.uniform2f(resLoc,canvas.width,canvas.height);

      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
