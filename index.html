<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Explorer: minecraft crypto</title>
  <link rel="icon" type="image/png" href="./1773159329332.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
      --input-collapse-ms: 460ms;
      --search-flow-ms: 640ms;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      font-synthesis: none;
      color: var(--text);
      background:
        radial-gradient(60% 55% at 10% 16%, rgba(183, 220, 255, 0.32) 0%, rgba(183, 220, 255, 0) 72%),
        radial-gradient(58% 55% at 90% 14%, rgba(170, 214, 252, 0.28) 0%, rgba(170, 214, 252, 0) 74%),
        radial-gradient(75% 62% at 50% 100%, rgba(210, 233, 255, 0.2) 0%, rgba(210, 233, 255, 0) 78%),
        #ffffff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -12% -10% auto -10%;
      height: 70vh;
      pointer-events: none;
      background:
        radial-gradient(18% 16% at 18% 28%, rgba(214, 236, 255, 0.42) 0%, rgba(214, 236, 255, 0) 72%),
        radial-gradient(14% 13% at 8% 12%, rgba(183, 220, 255, 0.36) 0%, rgba(183, 220, 255, 0) 68%),
        radial-gradient(16% 14% at 28% 18%, rgba(196, 230, 255, 0.28) 0%, rgba(196, 230, 255, 0) 70%),
        radial-gradient(15% 14% at 42% 8%, rgba(170, 210, 245, 0.32) 0%, rgba(170, 210, 245, 0) 68%),
        radial-gradient(18% 16% at 82% 22%, rgba(196, 226, 255, 0.42) 0%, rgba(196, 226, 255, 0) 74%),
        radial-gradient(14% 13% at 92% 15%, rgba(170, 214, 252, 0.34) 0%, rgba(170, 214, 252, 0) 66%),
        radial-gradient(16% 15% at 76% 8%, rgba(188, 222, 255, 0.3) 0%, rgba(188, 222, 255, 0) 68%),
        radial-gradient(13% 12% at 58% 14%, rgba(200, 228, 255, 0.26) 0%, rgba(200, 228, 255, 0) 66%);
      filter: blur(12px);
      animation: edgeDrift 18s ease-in-out infinite alternate;
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto -10% -12% -10%;
      height: 70vh;
      pointer-events: none;
      background:
        radial-gradient(18% 17% at 15% 72%, rgba(210, 233, 255, 0.4) 0%, rgba(210, 233, 255, 0) 74%),
        radial-gradient(15% 14% at 6% 88%, rgba(183, 220, 255, 0.34) 0%, rgba(183, 220, 255, 0) 66%),
        radial-gradient(17% 15% at 25% 82%, rgba(196, 228, 255, 0.3) 0%, rgba(196, 228, 255, 0) 70%),
        radial-gradient(14% 13% at 38% 92%, rgba(180, 218, 248, 0.28) 0%, rgba(180, 218, 248, 0) 68%),
        radial-gradient(18% 17% at 85% 75%, rgba(188, 224, 255, 0.42) 0%, rgba(188, 224, 255, 0) 76%),
        radial-gradient(15% 14% at 94% 85%, rgba(170, 214, 252, 0.36) 0%, rgba(170, 214, 252, 0) 68%),
        radial-gradient(16% 15% at 75% 92%, rgba(196, 226, 255, 0.32) 0%, rgba(196, 226, 255, 0) 70%),
        radial-gradient(13% 12% at 62% 86%, rgba(188, 220, 248, 0.28) 0%, rgba(188, 220, 248, 0) 66%);
      filter: blur(12px);
      animation: edgeDriftBottom 20s ease-in-out infinite alternate;
      z-index: -1;
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #04070b;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-18vh);
    }

    .title {
      margin: 0 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.34rem;
      font-size: clamp(1.5rem, 3.5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0;
      color: #04070b;
      user-select: none;
      -webkit-user-select: none;
    }

    .title-logo {
      width: clamp(2.8rem, 5vw, 3.7rem);
      height: clamp(2.8rem, 5vw, 3.7rem);
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 8px 18px rgba(98, 140, 188, 0.22));
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .search {
      display: block;
      width: 100%;
    }

    .search-input-wrapper {
      position: relative;
      width: 100%;
      min-height: 3.4rem;
      --search-width: 8.2rem;
      --search-start-shift: 5.2rem;
      isolation: isolate;
    }

    .search-input-wrapper::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      border-radius: 999px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.52) 0%, rgba(255, 255, 255, 0.12) 46%, rgba(222, 236, 250, 0.22) 100%),
        radial-gradient(110% 92% at 18% 18%, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 62%);
      opacity: 0.85;
      transition: right var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
                  transform var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
                  border-radius var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.28s ease;
      pointer-events: none;
      z-index: 1;
    }

    .search-input-wrapper input {
      width: 100%;
      min-height: 3.4rem;
      border: 1px solid rgba(223, 233, 243, 0.6);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(243, 248, 253, 0.9) 100%);
      border-radius: 999px;
      padding: 1.3rem 4.5rem 1.3rem 3.5rem;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      position: relative;
      z-index: 0;
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.9),
        inset 0 -1px 1px rgba(223, 233, 243, 0.3),
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 4px 12px -4px rgba(58, 88, 117, 0.15),
        0 1px 2px rgba(255, 255, 255, 0.9);
      transform-origin: right center;
      transition:
        width var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
        padding var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
        border-radius var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
        transform var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
        border-color var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-input-wrapper input:focus {
      border-color: rgba(207, 224, 240, 0.8);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.95),
        inset 0 -1px 1px rgba(223, 233, 243, 0.4),
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 0 0 3px #e9f3fb;
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.3rem;
      height: 1.3rem;
      pointer-events: none;
      opacity: 0.6;
      z-index: 2;
      transition: all var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-input-wrapper.has-text .search-icon {
      transform: translateY(-50%) translateX(0.2rem) scale(0.996);
    }

    .search-input-wrapper.has-text input {
      transform: scaleX(0.992) scaleY(0.996);
    }

    .search-input-wrapper.has-text input {
      width: calc(100% - var(--search-width) - 0.6rem);
      padding-right: 1.2rem;
      border-radius: 999px 120px 120px 999px;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.9),
        inset -10px 0 14px -12px rgba(164, 205, 243, 0.62),
        inset 0 -1px 1px rgba(223, 233, 243, 0.42),
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 4px 12px -4px rgba(58, 88, 117, 0.15),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search-input-wrapper.has-text::before {
      right: calc(var(--search-width) + 0.6rem);
      border-radius: 999px 120px 120px 999px;
      transform: scaleX(0.994);
    }

    .search-input-wrapper.has-text.is-morphing .search-icon {
      transform: translateY(-50%) translateX(0.4rem) scale(0.984);
    }

    .search-input-wrapper.has-text.is-morphing input {
      transform: scaleX(0.972) scaleY(0.984);
    }

    .search-input-wrapper.has-text.is-morphing input {
      border-radius: 999px 90px 90px 999px;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.95),
        inset -16px 0 18px -14px rgba(164, 205, 243, 0.62),
        inset 0 -1px 1px rgba(223, 233, 243, 0.42),
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 4px 12px -4px rgba(58, 88, 117, 0.15),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search-input-wrapper.has-text.is-morphing::before {
      right: calc(var(--search-width) + 0.6rem);
      border-radius: 999px 90px 90px 999px;
      transform: scaleX(0.975);
      opacity: 0.96;
    }

    .search-input-wrapper:has(.search-btn.active) input {
      border-radius: 999px;
    }

    .action-btn {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 3rem;
      height: 3rem;
      border: 1px solid rgba(223, 233, 243, 0.62);
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(241, 247, 252, 0.72) 100%);
      backdrop-filter: blur(10px) saturate(170%);
      -webkit-backdrop-filter: blur(10px) saturate(170%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #04070b;
      font-weight: 800;
      transition: right 0.65s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.4s ease 0.2s,
                  transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
      overflow: hidden;
      isolation: isolate;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.95),
        inset 0 -1px 1px rgba(220, 232, 245, 0.45),
        0 6px 14px -8px rgba(21, 52, 83, 0.45),
        0 2px 6px -2px rgba(58, 88, 117, 0.2);
    }

    .search-input-wrapper.has-text .action-btn {
      opacity: 0;
      pointer-events: none;
      right: calc(var(--search-width) + 0.5rem);
      transform: translateY(-50%) translateX(-0.3rem) scale(0.68) rotate(-72deg);
    }

    .search-input-wrapper.has-text.is-morphing .action-btn {
      opacity: 0;
      right: calc(var(--search-width) + 0.72rem);
      transform: translateY(-50%) translateX(-0.65rem) scale(0.44) rotate(-140deg);
    }

    .action-btn:hover {
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 1),
        inset 0 -1px 1px rgba(220, 232, 245, 0.5),
        0 8px 16px -8px rgba(21, 52, 83, 0.5),
        0 3px 8px -2px rgba(58, 88, 117, 0.24);
    }

    .action-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.56) 0%, rgba(255, 255, 255, 0.08) 55%, rgba(224, 236, 247, 0.25) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .action-btn::after {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      top: -52%;
      left: -48%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.72) 0%, rgba(255, 255, 255, 0) 58%);
      opacity: 0.58;
      transform: translate3d(0, 0, 0) scale(1);
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.55s ease;
      pointer-events: none;
      z-index: 0;
    }

    .action-btn:hover::after {
      transform: translate3d(4%, 4%, 0) scale(1.08);
      opacity: 0.78;
    }

    .action-btn .action-btn-slash,
    .action-btn .action-btn-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center;
      transition: opacity 0.38s ease, transform 0.48s cubic-bezier(0.22, 1, 0.36, 1), filter 0.38s ease;
      pointer-events: none;
      z-index: 1;
      color: rgba(20, 34, 53, 0.6);
    }

    .action-btn .action-btn-slash {
      line-height: 1;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
      filter: blur(0);
    }

    .action-btn .action-btn-icon {
      width: 1.05em;
      height: 1.05em;
      line-height: 1;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.65) rotate(12deg);
      filter: blur(0.35px);
    }

    .action-btn.is-paste .action-btn-slash {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.65) rotate(-10deg);
      filter: blur(0.35px);
    }

    .action-btn.is-paste .action-btn-icon {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
      filter: blur(0);
    }

    .search-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%) translateX(calc(-1 * var(--search-start-shift))) scale(0.65);
      border: 1px solid rgba(223, 233, 243, 0.6);
      border-radius: 999px;
      padding: 1.3rem 1.8rem;
      width: var(--search-width);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #04070b;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(243, 248, 253, 0.9) 100%);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.9),
        inset 0 -1px 1px rgba(223, 233, 243, 0.3),
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 4px 12px -4px rgba(58, 88, 117, 0.15),
        0 1px 2px rgba(255, 255, 255, 0.9);
      transition:
        opacity 0.18s ease,
        transform var(--search-flow-ms) cubic-bezier(0.23, 0.7, 0.25, 1),
        filter var(--search-flow-ms) cubic-bezier(0.23, 0.7, 0.25, 1);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
      white-space: nowrap;
      will-change: transform, opacity, filter;
      filter: blur(0.9px);
    }

    .search-btn-label {
      display: inline-block;
      opacity: 0;
      transform: scale(0.52) translateY(1px);
      filter: blur(0.6px);
      transform-origin: center;
      will-change: transform, opacity, filter;
    }

    .search-btn.active {
      opacity: 1;
      transform: translateY(-50%) translateX(0) scale(1);
      pointer-events: auto;
      filter: blur(0);
    }

    .search-btn.active .search-btn-label {
      animation: searchLabelFlow 0.48s cubic-bezier(0.22, 1, 0.36, 1) 0.16s both;
    }

    .search-btn:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(238, 245, 251, 0.92) 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 1),
        inset 0 -1px 1px rgba(223, 233, 243, 0.4),
        0 10px 28px -18px rgba(24, 55, 88, 0.5),
        0 4px 12px -4px rgba(58, 88, 117, 0.2),
        0 1px 2px rgba(255, 255, 255, 0.95);
    }

    @keyframes searchLabelFlow {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(1px);
        filter: blur(0.6px);
      }
      56% {
        opacity: 0.6;
        transform: scale(0.84) translateY(0.6px);
        filter: blur(0.25px);
      }
      82% {
        opacity: 1;
        transform: scale(1.05) translateY(0);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    @keyframes edgeDrift {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.95;
      }
      33% {
        transform: translate3d(1.5%, 1.2%, 0) scale(1.04);
        opacity: 1;
      }
      66% {
        transform: translate3d(-1.2%, 2%, 0) scale(1.02);
        opacity: 0.98;
      }
      100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.95;
      }
    }

    @keyframes edgeDriftBottom {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.96;
      }
      40% {
        transform: translate3d(-1.8%, -1%, 0) scale(1.03);
        opacity: 1;
      }
      70% {
        transform: translate3d(1.4%, -1.8%, 0) scale(1.05);
        opacity: 0.97;
      }
      100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.96;
      }
    }

    @media (max-width: 680px) {
      body::before {
        background:
          radial-gradient(24% 22% at 18% 28%, rgba(214, 236, 255, 0.42) 0%, rgba(214, 236, 255, 0) 72%),
          radial-gradient(20% 18% at 8% 12%, rgba(183, 220, 255, 0.36) 0%, rgba(183, 220, 255, 0) 68%),
          radial-gradient(22% 20% at 28% 18%, rgba(196, 230, 255, 0.28) 0%, rgba(196, 230, 255, 0) 70%),
          radial-gradient(24% 22% at 82% 22%, rgba(196, 226, 255, 0.42) 0%, rgba(196, 226, 255, 0) 74%),
          radial-gradient(20% 19% at 92% 15%, rgba(170, 214, 252, 0.34) 0%, rgba(170, 214, 252, 0) 66%),
          radial-gradient(22% 20% at 76% 8%, rgba(188, 222, 255, 0.3) 0%, rgba(188, 222, 255, 0) 68%);
        filter: blur(10px);
      }

      body::after {
        background:
          radial-gradient(24% 23% at 15% 72%, rgba(210, 233, 255, 0.4) 0%, rgba(210, 233, 255, 0) 74%),
          radial-gradient(21% 19% at 6% 88%, rgba(183, 220, 255, 0.34) 0%, rgba(183, 220, 255, 0) 66%),
          radial-gradient(23% 21% at 25% 82%, rgba(196, 228, 255, 0.3) 0%, rgba(196, 228, 255, 0) 70%),
          radial-gradient(24% 23% at 85% 75%, rgba(188, 224, 255, 0.42) 0%, rgba(188, 224, 255, 0) 76%),
          radial-gradient(21% 20% at 94% 85%, rgba(170, 214, 252, 0.36) 0%, rgba(170, 214, 252, 0) 68%),
          radial-gradient(22% 21% at 75% 92%, rgba(196, 226, 255, 0.32) 0%, rgba(196, 226, 255, 0) 70%);
        filter: blur(10px);
      }

      main {
        transform: translateY(-18vh);
      }

      .title {
        gap: 0.24rem;
      }

      .title-logo {
        width: 2.5rem;
        height: 2.5rem;
      }

      .search-input-wrapper input {
        padding: 1.1rem 4.5rem 1.1rem 3.5rem;
        font-size: 0.95rem;
        min-height: 3rem;
      }

      .search-input-wrapper {
        --search-width: 6.9rem;
        --search-start-shift: 4.37rem;
      }

      .search-input-wrapper.has-text .search-icon {
        transform: translateY(-50%) translateX(0.2rem) scale(0.996);
      }

      .search-input-wrapper.has-text input {
        transform: scaleX(0.992) scaleY(0.996);
      }

      .search-input-wrapper.has-text input {
        width: calc(100% - var(--search-width) - 0.6rem);
        padding-right: 1.2rem;
        border-radius: 999px 120px 120px 999px;
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.9),
          inset -10px 0 14px -12px rgba(164, 205, 243, 0.62),
          inset 0 -1px 1px rgba(223, 233, 243, 0.42),
          0 10px 24px -18px rgba(24, 55, 88, 0.45),
          0 4px 12px -4px rgba(58, 88, 117, 0.15),
          0 1px 2px rgba(255, 255, 255, 0.9);
      }

      .search-input-wrapper.has-text::before {
        right: calc(var(--search-width) + 0.6rem);
        border-radius: 999px 120px 120px 999px;
        transform: scaleX(0.994);
      }

      .search-input-wrapper.has-text.is-morphing .search-icon {
        transform: translateY(-50%) translateX(0.4rem) scale(0.984);
      }

      .search-input-wrapper.has-text.is-morphing input {
        transform: scaleX(0.972) scaleY(0.984);
      }

      .search-input-wrapper.has-text.is-morphing input {
        border-radius: 999px 90px 90px 999px;
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.95),
          inset -16px 0 18px -14px rgba(164, 205, 243, 0.62),
          inset 0 -1px 1px rgba(223, 233, 243, 0.42),
          0 10px 24px -18px rgba(24, 55, 88, 0.45),
          0 4px 12px -4px rgba(58, 88, 117, 0.15),
          0 1px 2px rgba(255, 255, 255, 0.9);
      }

      .search-input-wrapper.has-text.is-morphing::before {
        right: calc(var(--search-width) + 0.6rem);
        border-radius: 999px 90px 90px 999px;
        transform: scaleX(0.975);
        opacity: 0.96;
      }

      .search-input-wrapper:has(.search-btn.active) input {
        border-radius: 999px;
      }

      .action-btn {
        width: 2.8rem;
        height: 2.8rem;
      }

      .search-input-wrapper.has-text .action-btn {
        transform: translateY(-50%) translateX(-0.22rem) scale(0.66) rotate(-68deg);
      }

      .search-input-wrapper.has-text.is-morphing .action-btn {
        right: calc(var(--search-width) + 0.66rem);
        transform: translateY(-50%) translateX(-0.5rem) scale(0.42) rotate(-132deg);
      }

      .search-btn {
        padding: 1.1rem 1.3rem;
        font-size: 0.9rem;
        width: 6.9rem;
        transform: translateY(-50%) translateX(calc(-1 * var(--search-start-shift))) scale(0.65);
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <button type="button" class="wallet-btn">Connect Wallet</button>
  </div>

  <main class="container">
    <h1 class="title"><img class="title-logo" src="./1773159329332.png" alt="Elysium logo" draggable="false" />Elysiumviewer</h1>
    <div class="search">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search by address, name or transaction" />
        <button class="action-btn" id="actionBtn" title="Slash to search" aria-label="Slash to search">
          <span class="action-btn-slash">/</span>
          <svg class="action-btn-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <title>paste-16</title>
            <path fill="currentColor" fill-rule="evenodd" d="M14 8h-4a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1m-4-1c-1.1 0-2 .895-2 2v5c0 1.1.895 2 2 2h4c1.1 0 2-.895 2-2V9c0-1.1-.895-2-2-2z" clip-rule="evenodd"/>
            <path fill="currentColor" d="M10 9.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"/>
            <path fill="currentColor" fill-rule="evenodd" d="M9 3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h5v1H2c-1.1 0-2-.895-2-2V4c0-1.1.895-2 2-2h1a1 1 0 0 1 1-1h.268a1.998 1.998 0 0 1 3.46 0h.268a1 1 0 0 1 1 1h1c1.1 0 2 .895 2 2v2h-1V4a1 1 0 0 0-1-1h-1zM4.27 2a1 1 0 0 0 .866-.499a1 1 0 0 1 1.734 0A1 1 0 0 0 7.736 2h.018a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-3.5a.25.25 0 0 1-.25-.25v-.5a.25.25 0 0 1 .25-.25h.017z" clip-rule="evenodd"/>
          </svg>
        </button>
        <button class="search-btn" id="searchBtn"><span class="search-btn-label">Search</span></button>
      </div>
    </div>
  </main>

  <script>
    const input = document.getElementById('searchInput');
    const actionBtn = document.getElementById('actionBtn');
    const searchBtn = document.getElementById('searchBtn');
    const wrapper = input.closest('.search-input-wrapper');
    let isActive = false;
    let morphTimer = null;
    let searchRevealTimer = null;
    const INPUT_COLLAPSE_DELAY = 460;
    const SEARCH_REVEAL_DELAY = 150;

    actionBtn.addEventListener('mousedown', (e) => {
      // Keep input focus while clicking the action button to avoid blur-reset race.
      e.preventDefault();
    });

    actionBtn.addEventListener('click', async () => {
      if (!isActive) {
        isActive = true;
        input.focus();
        updateActionBtn();
      } else {
        try {
          const text = await navigator.clipboard.readText();
          input.value = text;
          input.dispatchEvent(new Event('input'));
        } catch (err) {
          console.log('Paste not available');
        }
      }
    });

    input.addEventListener('input', () => {
      if (input.value.length > 0) {
        const wasHidden = !wrapper.classList.contains('has-text');
        wrapper.classList.add('has-text');
        clearTimeout(searchRevealTimer);

        if (wasHidden) {
          wrapper.classList.add('is-morphing');
          searchBtn.classList.remove('active');

          searchRevealTimer = setTimeout(() => {
            if (input.value.length > 0) {
              searchBtn.classList.add('active');
            }
          }, SEARCH_REVEAL_DELAY);

          clearTimeout(morphTimer);
          morphTimer = setTimeout(() => {
            wrapper.classList.remove('is-morphing');
          }, INPUT_COLLAPSE_DELAY + 360);
        } else if (!searchBtn.classList.contains('active')) {
          searchRevealTimer = setTimeout(() => {
            if (input.value.length > 0) {
              searchBtn.classList.add('active');
            }
          }, SEARCH_REVEAL_DELAY);
        }
      } else {
        clearTimeout(searchRevealTimer);
        clearTimeout(morphTimer);
        wrapper.classList.remove('has-text');
        wrapper.classList.remove('is-morphing');
        searchBtn.classList.remove('active');
      }
    });

    input.addEventListener('focus', () => {
      isActive = true;
      updateActionBtn();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== '/' || e.ctrlKey || e.metaKey || e.altKey) {
        return;
      }

      const target = e.target;
      const isTypingTarget = target && (
        target.tagName === 'INPUT' ||
        target.tagName === 'TEXTAREA' ||
        target.isContentEditable
      );

      if (!isTypingTarget) {
        e.preventDefault();
        isActive = true;
        updateActionBtn();
        input.focus();
      }
    });

    input.addEventListener('blur', (e) => {
      if (e.relatedTarget === actionBtn) {
        return;
      }

      if (input.value.length === 0) {
        isActive = false;
        updateActionBtn();
      }
    });

    function updateActionBtn() {
      if (isActive) {
        actionBtn.classList.add('is-paste');
        actionBtn.title = 'Paste';
        actionBtn.setAttribute('aria-label', 'Paste');
      } else {
        actionBtn.classList.remove('is-paste');
        actionBtn.title = 'Slash to search';
        actionBtn.setAttribute('aria-label', 'Slash to search');
      }
    }

    searchBtn.addEventListener('click', () => {
      console.log('Search:', input.value);
    });
  </script>

</body>
</html>
