<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium: minecraft crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at -5% 5%, #d7e7fb 0, #e9f0f8 36%, transparent 60%),
        radial-gradient(circle at 98% 1%, #d9ecff 0, #edf3f9 28%, transparent 56%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      min-height: 100vh;
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      padding-top: 1rem;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      padding: 4.8rem 0 1.4rem;
    }

    .title {
      margin: 0 0 0.5rem;
      text-align: center;
      font-size: clamp(1.6rem, 3.1vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 0 1rem;
      text-align: center;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .search {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem;
      padding: 0.5rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
    }

    .search input {
      width: 100%;
      border: 1px solid #e3ebf3;
      background: #f8fbff;
      border-radius: 11px;
      padding: 0.82rem 0.92rem;
      font-family: inherit;
      font-size: 0.94rem;
      color: var(--text);
      outline: none;
    }

    .search input:focus {
      border-color: #9ecfff;
      box-shadow: 0 0 0 3px #d8ecff;
    }

    .search button {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0 1rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #3a5875;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 #ffffff,
        0 10px 24px -18px rgba(24, 55, 88, 0.45),
        0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .search button:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    @media (max-width: 680px) {
      main {
        padding-top: 3.8rem;
      }

      .search {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container top">
    <button type="button" class="wallet-btn">Connect wallet</button>
  </div>

  <main class="container">
    <h1 class="title">Elysiumviewer</h1>
    <p class="subtitle">Search by address / tx hash / block / NFT / domain</p>
    <div class="search">
      <input type="text" placeholder="Start typing to search..." />
      <button type="button">Search</button>
    </div>
    
  </main>
</body>
</html>
