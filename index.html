<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Explorer: minecraft crypto</title>
  <link rel="icon" type="image/png" href="./1773159329332.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3f8;
      --bg-2: #e7edf4;
      --panel: #ffffff;
      --line: #d7e2ee;
      --text: #142235;
      --muted: #67819c;
      --brand: #1598ff;
      --shadow-soft: 0 16px 34px -20px rgba(26, 66, 110, 0.35);
      --input-collapse-ms: 460ms;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      font-synthesis: none;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(183, 220, 255, 0.28) 0%, rgba(183, 220, 255, 0) 42%),
        radial-gradient(circle at 88% 12%, rgba(170, 214, 252, 0.24) 0%, rgba(170, 214, 252, 0) 38%),
        #eef3f8;
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      overflow-x: hidden;
    }

    .container {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .top {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    .corner-logo {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: clamp(2.55rem, 5vw, 3.2rem);
      height: clamp(2.55rem, 5vw, 3.2rem);
      border-radius: 0.95rem;
      border: 1px solid rgba(223, 233, 243, 0.72);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.78) 0%, rgba(241, 247, 252, 0.56) 100%);
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(20, 50, 80, 0.16);
      z-index: 100;
      pointer-events: none;
    }

    .corner-logo img {
      width: 76%;
      height: 76%;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(22, 46, 74, 0.3));
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .wallet-btn {
      border: 1px solid #dfe9f3;
      border-radius: 999px;
      padding: 0.72rem 1.05rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #04070b;
      background:
        linear-gradient(180deg, #ffffff 0%, #f3f8fd 100%);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(24, 55, 88, 0.16);
    }

    .wallet-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eef5fb 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-18vh);
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.18rem;
      font-size: clamp(1.5rem, 3.5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0;
      color: #04070b;
      user-select: none;
      -webkit-user-select: none;
    }

    .title-text {
      display: inline-block;
      font-weight: 800;
      letter-spacing: -0.02em;
      transform: scaleX(1.02);
      transform-origin: left center;
      text-shadow: 0 0 0.01px currentColor;
    }

    .title-logo {
      width: clamp(2.8rem, 5vw, 3.7rem);
      height: clamp(2.8rem, 5vw, 3.7rem);
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 8px 18px rgba(98, 140, 188, 0.22));
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .search {
      display: block;
      width: 100%;
    }

    .search-input-wrapper {
      position: relative;
      width: 100%;
      min-height: 3.4rem;
      --search-width: 8.2rem;
      isolation: isolate;
      border-radius: 999px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.72) 0%, rgba(240, 245, 252, 0.92) 100%);
      overflow: hidden;
    }

    .search-input-wrapper input {
      width: 100%;
      min-height: 3.4rem;
      border: 1px solid rgba(223, 233, 243, 0.7);
      background: transparent;
      border-radius: 999px;
      padding: 1.3rem 3.5rem 1.3rem 3.5rem;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      position: relative;
      z-index: 0;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.8),
        inset 0 -1px 1px rgba(223, 233, 243, 0.35);
      transition:
        padding var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1),
        border-color var(--input-collapse-ms) cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-input-wrapper input:focus {
      border-color: rgba(207, 224, 240, 0.85);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.95),
        inset 0 -1px 1px rgba(223, 233, 243, 0.45);
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.3rem;
      height: 1.3rem;
      pointer-events: none;
      opacity: 0.7;
      z-index: 2;
      transition: opacity 0.18s ease;
    }

    .search-input-wrapper.has-text input {
      padding-right: calc(3.5rem + var(--search-width) + 0.8rem);
    }

    .search-input-wrapper.has-text .action-btn {
      opacity: 0;
      pointer-events: none;
    }

    .action-btn {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 3rem;
      height: 3rem;
      border: 1px solid rgba(223, 233, 243, 0.62);
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(241, 247, 252, 0.72) 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #04070b;
      font-weight: 800;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 10;
      overflow: hidden;
      isolation: isolate;
      box-shadow: 0 6px 14px -8px rgba(21, 52, 83, 0.22);
    }

    .search-input-wrapper.has-text .action-btn {
      opacity: 0;
      pointer-events: none;
    }

    .action-btn:hover {
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 1),
        inset 0 -1px 1px rgba(220, 232, 245, 0.5),
        0 8px 16px -8px rgba(21, 52, 83, 0.5),
        0 3px 8px -2px rgba(58, 88, 117, 0.24);
    }

    .action-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.56) 0%, rgba(255, 255, 255, 0.08) 55%, rgba(224, 236, 247, 0.25) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .action-btn::after {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      top: -52%;
      left: -48%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.72) 0%, rgba(255, 255, 255, 0) 58%);
      opacity: 0.58;
      transform: translate3d(0, 0, 0) scale(1);
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.55s ease;
      pointer-events: none;
      z-index: 0;
    }

    .action-btn:hover::after {
      transform: translate3d(4%, 4%, 0) scale(1.08);
      opacity: 0.78;
    }

    .action-btn .action-btn-slash,
    .action-btn .action-btn-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center;
      transition: opacity 0.38s ease, transform 0.48s cubic-bezier(0.22, 1, 0.36, 1), filter 0.38s ease;
      pointer-events: none;
      z-index: 1;
      color: rgba(20, 34, 53, 0.6);
    }

    .action-btn .action-btn-slash {
      line-height: 1;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
      filter: blur(0);
    }

    .action-btn .action-btn-icon {
      width: 1.05em;
      height: 1.05em;
      line-height: 1;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.65) rotate(12deg);
      filter: blur(0.35px);
    }

    .action-btn.is-paste .action-btn-slash {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.65) rotate(-10deg);
      filter: blur(0.35px);
    }

    .action-btn.is-paste .action-btn-icon {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
      filter: blur(0);
    }

    .search-btn {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid rgba(223, 233, 243, 0.6);
      border-radius: 999px;
      padding: 1.3rem 1.8rem;
      width: var(--search-width);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #04070b;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(243, 248, 253, 0.95) 100%);
      cursor: pointer;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.9),
        0 6px 14px -8px rgba(21, 52, 83, 0.25);
      transition: opacity 0.18s ease, transform 0.18s ease, filter 0.18s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
      white-space: nowrap;
      filter: blur(0.2px);
    }

    .search-btn-label {
      display: inline-block;
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
      transform-origin: center;
    }

    .search-btn.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%);
      filter: blur(0);
    }

    .search-btn:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(238, 245, 251, 0.96) 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 1),
        0 6px 14px -8px rgba(21, 52, 83, 0.28);
    }

    @media (max-width: 680px) {
      main {
        transform: translateY(-18vh);
      }

      .title {
        gap: 0.12rem;
      }

      .corner-logo {
        top: 0.8rem;
        left: 0.8rem;
      }

      .title-text {
        transform: scaleX(1.015);
      }

      .title-logo {
        width: 2.5rem;
        height: 2.5rem;
      }

      .search-input-wrapper input {
        padding: 1.1rem 3.2rem 1.1rem 3.2rem;
        font-size: 0.95rem;
        min-height: 3rem;
      }

      .search-input-wrapper {
        --search-width: 6.9rem;
      }

      .action-btn {
        width: 2.8rem;
        height: 2.8rem;
      }

      .search-btn {
        padding: 1.1rem 1.3rem;
        font-size: 0.9rem;
        width: 6.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="corner-logo" aria-hidden="true">
    <img src="./IMG_20260326_094426_032.png" alt="" draggable="false" />
  </div>
  <div class="top">
    <button type="button" class="wallet-btn">Connect Wallet</button>
  </div>

  <main class="container">
    <h1 class="title"><img class="title-logo" src="./1773159329332.png" alt="Elysium logo" draggable="false" /><span class="title-text">Elysiumviewer</span></h1>
    <div class="search">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search by address, name or transaction" />
        <button class="action-btn" id="actionBtn" title="Slash to search" aria-label="Slash to search">
          <span class="action-btn-slash">/</span>
          <svg class="action-btn-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <title>paste-16</title>
            <path fill="currentColor" fill-rule="evenodd" d="M14 8h-4a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1m-4-1c-1.1 0-2 .895-2 2v5c0 1.1.895 2 2 2h4c1.1 0 2-.895 2-2V9c0-1.1-.895-2-2-2z" clip-rule="evenodd"/>
            <path fill="currentColor" d="M10 9.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"/>
            <path fill="currentColor" fill-rule="evenodd" d="M9 3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h5v1H2c-1.1 0-2-.895-2-2V4c0-1.1.895-2 2-2h1a1 1 0 0 1 1-1h.268a1.998 1.998 0 0 1 3.46 0h.268a1 1 0 0 1 1 1h1c1.1 0 2 .895 2 2v2h-1V4a1 1 0 0 0-1-1h-1zM4.27 2a1 1 0 0 0 .866-.499a1 1 0 0 1 1.734 0A1 1 0 0 0 7.736 2h.018a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-3.5a.25.25 0 0 1-.25-.25v-.5a.25.25 0 0 1 .25-.25h.017z" clip-rule="evenodd"/>
          </svg>
        </button>
        <button class="search-btn" id="searchBtn"><span class="search-btn-label">Search</span></button>
      </div>
    </div>
  </main>

  <script>
    const input = document.getElementById('searchInput');
    const actionBtn = document.getElementById('actionBtn');
    const searchBtn = document.getElementById('searchBtn');
    const wrapper = input.closest('.search-input-wrapper');
    let isActive = false;

    actionBtn.addEventListener('mousedown', (e) => {
      e.preventDefault();
    });

    actionBtn.addEventListener('click', async () => {
      if (!isActive) {
        isActive = true;
        input.focus();
        updateActionBtn();
      } else {
        try {
          const text = await navigator.clipboard.readText();
          input.value = text;
          input.dispatchEvent(new Event('input'));
        } catch (err) {
          console.log('Paste not available');
        }
      }
    });

    input.addEventListener('input', () => {
      const hasText = input.value.length > 0;
      wrapper.classList.toggle('has-text', hasText);
      searchBtn.classList.toggle('active', hasText);
    });

    input.addEventListener('focus', () => {
      isActive = true;
      updateActionBtn();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== '/' || e.ctrlKey || e.metaKey || e.altKey) {
        return;
      }

      const target = e.target;
      const isTypingTarget = target && (
        target.tagName === 'INPUT' ||
        target.tagName === 'TEXTAREA' ||
        target.isContentEditable
      );

      if (!isTypingTarget) {
        e.preventDefault();
        isActive = true;
        updateActionBtn();
        input.focus();
      }
    });

    input.addEventListener('blur', (e) => {
      if (e.relatedTarget === actionBtn) {
        return;
      }

      if (input.value.length === 0) {
        isActive = false;
        updateActionBtn();
      }
    });

    function updateActionBtn() {
      if (isActive) {
        actionBtn.classList.add('is-paste');
        actionBtn.title = 'Paste';
        actionBtn.setAttribute('aria-label', 'Paste');
      } else {
        actionBtn.classList.remove('is-paste');
        actionBtn.title = 'Slash to search';
        actionBtn.setAttribute('aria-label', 'Slash to search');
      }
    }

    searchBtn.addEventListener('click', () => {
      console.log('Search:', input.value);
    });
  </script>

</body>
</html>
